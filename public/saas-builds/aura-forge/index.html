<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuraForge — Where Capital Meets Conviction</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            ink: '#0B0B0F',
            surface: '#121218',
            glass: 'rgba(255,255,255,0.04)',
            aura: {
              violet: '#8B5CF6',
              magenta: '#EC4899',
              cyan: '#22D3EE',
            },
            accent: '#8B5CF6',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            glow: '0 0 60px -10px rgba(139,92,246,0.5)',
            'glow-pink': '0 0 60px -10px rgba(236,72,153,0.5)',
          },
        },
      },
    };
  </script>

  <!-- React 19 -->
  <script crossorigin src="https://unpkg.com/react@19/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@19/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-ink text-white font-sans antialiased">
  <div id="root"></div>
  <script type="text/babel" data-presets="react" src="app.tsx"></script>
</body>
</html>
